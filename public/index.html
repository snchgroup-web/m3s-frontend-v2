<!DOCTYPE html>

  <head>

    <meta name="theme-color" content="#000000" />
    <meta name="description" content="M3S ERP v2.0" />
    <title>M3S v2.0</title>
    <script>if(localStorage.getItem('theme')!=='light'){document.documentElement.classList.add('dark')}</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html,body,#root{min-height:100%;margin:0}body{background:#0f172a}.header-chip,.header-select,.icon-button{border-radius:6px}.header-select{background:#334155;border:1px solid #475569;color:#e2e8f0;padding:.4rem .5rem;font-size:.75rem}.icon-button{width:2.25rem;height:2.25rem;display:inline-flex;align-items:center;justify-content:center;transition:background-color 150ms ease}.icon-button:hover{background:rgba(100,116,139,.24)}
      html:not(.dark) body{background:#f3f6fa;color:#172033}html:not(.dark) .app-shell,html:not(.dark) .min-h-screen{background:#f3f6fa!important;color:#172033!important}html:not(.dark) .app-header,html:not(.dark) .bg-slate-800{background-color:#fff!important}html:not(.dark) .bg-slate-900{background-color:#f3f6fa!important}html:not(.dark) .bg-slate-700{background-color:#e7edf5!important}html:not(.dark) .bg-slate-700\/50,html:not(.dark) .bg-slate-700\/30{background-color:rgba(226,232,240,.75)!important}html:not(.dark) .bg-slate-900\/35{background-color:#f8fafc!important}html:not(.dark) .text-white,html:not(.dark) .text-gray-100{color:#172033!important}html:not(.dark) .text-slate-300{color:#334155!important}html:not(.dark) .text-slate-400{color:#52647a!important}html:not(.dark) .text-slate-500{color:#64748b!important}html:not(.dark) .border-slate-700,html:not(.dark) .border-slate-600{border-color:#d7e0eb!important}html:not(.dark) input,html:not(.dark) select,html:not(.dark) textarea{background-color:#fff!important;color:#172033!important;border-color:#cbd5e1!important}html:not(.dark) .header-select{background:#fff!important;color:#172033!important}html:not(.dark) .shadow-lg{box-shadow:0 8px 24px rgba(30,41,59,.08)!important}html:not(.dark) .from-slate-900,html:not(.dark) .via-slate-800,html:not(.dark) .to-slate-900{--tw-gradient-from:#f3f6fa!important;--tw-gradient-via:#eef3f8!important;--tw-gradient-to:#f3f6fa!important}.recharts-cartesian-grid line{stroke-opacity:.24}.recharts-default-tooltip{border-radius:6px!important;box-shadow:0 8px 24px rgba(15,23,42,.16)!important}.recharts-legend-item-text{font-size:12px}
    </style>
