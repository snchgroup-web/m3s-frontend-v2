<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="M3S ERP v2.0" />
    <title>M3S v2.0</title>
    <script>if(localStorage.getItem('theme')!=='light'){document.documentElement.classList.add('dark')}</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html,body,#root{min-height:100%;margin:0}body{background:#0f172a}.header-chip,.header-select,.icon-button{border-radius:6px}.header-select{background:#334155;border:1px solid #475569;color:#e2e8f0;padding:.4rem .5rem;font-size:.75rem}.icon-button{width:2.25rem;height:2.25rem;display:inline-flex;align-items:center;justify-content:center;transition:background-color 150ms ease}.icon-button:hover{background:rgba(100,116,139,.24)}
      html.dark body,html.dark .app-shell,html.dark .min-h-screen,html.dark .bg-slate-900{background:#272757!important}html.dark .app-header{background:#22224b!important}html.dark .bg-slate-800{background:#303064!important}html.dark .bg-slate-700{background:#3a3a70!important}html.dark .border-slate-700,html.dark .border-slate-600{border-color:#46467d!important}html.dark .bg-slate-900\/35{background:rgba(16,16,52,.34)!important}html.dark .header-chip{background:rgba(255,255,255,.055)!important;box-shadow:0 4px 14px rgba(8,8,35,.18)}html.dark .from-slate-900,html.dark .via-slate-800,html.dark .to-slate-900{--tw-gradient-from:#272757!important;--tw-gradient-via:#2d2d61!important;--tw-gradient-to:#272757!important}
      html:not(.dark) body{background:#edf3fa;color:#172033}html:not(.dark) .app-shell,html:not(.dark) .min-h-screen{background:#edf3fa!important;color:#172033!important}html:not(.dark) .app-header,html:not(.dark) .bg-slate-800{background-color:rgba(255,255,255,.60)!important;backdrop-filter:blur(14px)}html:not(.dark) .bg-slate-900{background-color:#edf3fa!important}html:not(.dark) .bg-slate-700{background-color:rgba(222,232,244,.72)!important}html:not(.dark) .bg-slate-700\/50,html:not(.dark) .bg-slate-700\/30{background-color:rgba(226,232,240,.60)!important}html:not(.dark) .bg-slate-900\/35{background-color:rgba(255,255,255,.46)!important}html:not(.dark) .header-chip{background:rgba(255,255,255,.58)!important;box-shadow:0 4px 16px rgba(39,39,87,.07)}html:not(.dark) .text-white,html:not(.dark) .text-gray-100{color:#20204c!important}html:not(.dark) .text-slate-300{color:#373763!important}html:not(.dark) .text-slate-400{color:#5b6480!important}html:not(.dark) .text-slate-500{color:#6d7690!important}html:not(.dark) .border-slate-700,html:not(.dark) .border-slate-600{border-color:rgba(39,39,87,.12)!important}html:not(.dark) input,html:not(.dark) select,html:not(.dark) textarea{background-color:rgba(255,255,255,.78)!important;color:#20204c!important;border-color:rgba(39,39,87,.18)!important}html:not(.dark) .header-select{background:rgba(255,255,255,.72)!important;color:#20204c!important}html:not(.dark) .shadow-lg{box-shadow:0 10px 28px rgba(39,39,87,.08)!important}html:not(.dark) .from-slate-900,html:not(.dark) .via-slate-800,html:not(.dark) .to-slate-900{--tw-gradient-from:#edf3fa!important;--tw-gradient-via:#f7faff!important;--tw-gradient-to:#edf3fa!important}.recharts-cartesian-grid line{stroke-opacity:.28}.recharts-default-tooltip{border-radius:6px!important;box-shadow:0 10px 28px rgba(16,16,52,.16)!important}.recharts-legend-item-text{font-size:12px}
    </style>
